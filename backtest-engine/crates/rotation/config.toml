# ============================================================================
# 截面轮动策略配置
# ============================================================================

[backtest]
initial_capital = 500000.0  # 初始资金
max_positions = 20          # 最大持仓数量
max_daily_buys = 20          # 每日最多新开仓数量 (渐进建仓)
position_size_pct = 0.05    # 单只股票仓位比例 (5% = 1/20)
max_hold_days = 10          # 最大持有天数

# 回测时间范围
start_date = "2022-09-01"
end_date = ""

# 最小仓位比例阈值
min_position_ratio = 0.5

# ----------------------------------------------------------------------------
# 选股设置
# ----------------------------------------------------------------------------
[entry]
top_n = 20               # 每日候选池: score 前 N 名
entry_rank_limit = 20     # 仅允许新开仓来自前 M 名
hold_buffer = 20         # 持仓保留阈值: 排名跌出 Top-(N+buffer) 才卖出 (经 4-20 实验锁定为 B1 最优)
min_score = 0.002        # 最低 score 阈值 (低于此值不买入, 0.0 = 不过滤)
require_bull_regime = false  # true 时仅在 PriceBar.is_bull_regime 为 true 的日子允许新开仓
                             # 卖出逻辑 (排名/止损/移动止损/max_hold_days) 完全不受影响
                             # 老 parquet 不带 is_bull_regime 列时自动当作 false (gate 永远屏蔽, 慎开)

# ----------------------------------------------------------------------------
# 止损设置
# ----------------------------------------------------------------------------
[stop_loss]
enabled = true
pct = 0.05          # 止损比例 (5%)

# ----------------------------------------------------------------------------
# 移动止损
# ----------------------------------------------------------------------------
[trailing_stop]
enabled = false
activation_pct = 0.10
trailing_pct = 0.05

# ----------------------------------------------------------------------------
# 交易成本
# ----------------------------------------------------------------------------
[costs]
commission_rate = 0.00025   # 佣金 (万2.5)
stamp_duty_rate = 0.001     # 印花税 (千1，仅卖出)
slippage_pct = 0.001        # 滑点 (0.3%, 含14:45~15:00快照误差)

# ============================================================================
# QuantLab Backtest Engine Configuration
# ============================================================================

[backtest]
initial_capital = 100000.0  # 初始资金
max_positions = 5          # 最大持仓数量
max_daily_buys = 5          # 每天最多买入数量
position_size_pct = 0.2     # 单只股票仓位比例 (20%)
max_hold_days = 30          # 最大持有天数

# 回测时间范围 (可选，留空则使用 parquet 文件的完整范围)
start_date = "2025-01-05"             # 开始日期, 格式: "2025-01-01"
end_date = "2026-03-31"               # 结束日期, 格式: "2025-12-31"

# 买入排序字段 (候选股票的优先级排序)
sort_field = "score"                  # 排序字段名 (parquet 中的列名)
sort_ascending = false                # true=升序 (值小优先), false=降序 (值大优先)

# 最小仓位比例 (现金不足时，至少能买目标仓位的 X% 才执行买入)
min_position_ratio = 0.5              # 50% = 至少能买目标仓位的一半

# ----------------------------------------------------------------------------
# 止损设置
# ----------------------------------------------------------------------------
[stop_loss]
enabled = true
pct = 0.03                  # 止损比例 (3%)

# ----------------------------------------------------------------------------
# 止盈设置 (分阶段止盈)
# ----------------------------------------------------------------------------
[take_profit]
tp1_pct = 0.15              # 第一阶段止盈 (15%)
tp2_pct = 0.30              # 第二阶段止盈 (30%)
sell_ratio = 0.333          # 每阶段卖出比例 (1/3)
sell_on_break_wl = true     # Stage2 跌破 WL 清仓
sell_on_break_yl = false    # 跌破 YL 清仓 (已禁用)

# ----------------------------------------------------------------------------
# 弱势清仓规则
# ----------------------------------------------------------------------------
[weak_performance]
enabled = true
days = 10                   # N 天后检查
min_gain_pct = 0.05         # 最低涨幅要求 (5%)

# ----------------------------------------------------------------------------
# 移动止损 (Trailing Stop)
# ----------------------------------------------------------------------------
[trailing_stop]
enabled = false
activation_pct = 0.10       # 涨幅达到 10% 后激活
trailing_pct = 0.05         # 从最高点回撤 5% 止损

# ----------------------------------------------------------------------------
# 交易成本
# ----------------------------------------------------------------------------
[costs]
commission_rate = 0.00025   # 佣金 (万2.5，买卖双边)
stamp_duty_rate = 0.001     # 印花税 (千1，仅卖出)
slippage_pct = 0.001        # 滑点 (0.1%)

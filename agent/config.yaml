data:
  db_path: "../QuantData/Ashare/qmt_data.duckdb"
  chart_output: "data/charts"
  review_output: "data/review"

selection:
  top_n: 20
  rank_by: "rw_dif_pct"
  rank_ascending: false
  bars: 90

reviewer:
  provider: "gemini"            # gemini / claude (待实现)
  model: "gemini-2.5-flash"
  request_delay: 3              # API 调用间隔 (秒)
  skip_existing: true           # 断点续跑: 已有结果则跳过
  suggest_min_score: 4.0

b1_config:
  WEEKLY_WL_YL_FILTER: true
